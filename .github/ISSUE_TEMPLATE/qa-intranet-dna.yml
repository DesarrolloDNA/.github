name: "🧪 QA Review - Intranet DNA Evoluciona"
description: "QA de la Intranet DNA Evoluciona (Next.js 16 + FastAPI + PostgreSQL + Odoo). 30 criterios: funcional, responsivo movil y seguridad F1 a F5. Especifico de este repo, NO usar en otros."
title: "[QA][intranet-dna] <feature/sprint que estas probando>"
labels:
  - qa
body:
  - type: markdown
    attributes:
      value: |
        ## Contexto de esta sesion de QA
        Llena estos campos antes de empezar (si algo no aplica, escribe N/A) y reproduce cada flujo en la web, en orden.
        Prueba en movil (~360-414px) Y en escritorio: gran parte del sprint fue responsivo y el desktop NO debe cambiar respecto a antes.
        Usa datos y cuentas de PRUEBA; Odoo en DESARROLLO. Nada va a produccion sin pasar por el VPS de pruebas.
        Stack: Next 16 (3005) hacia FastAPI (8010) hacia Postgres + Odoo (company_id=1). Sesion JWT Bearer (access 60 min, refresh 7 dias que rota). Roles: super_admin, director, gerente, coordinador, colaborador (RH = Director por puesto Capital Humano/RH).
  - type: input
    id: branch
    attributes:
      label: Rama probada
      placeholder: "dev / QA"
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit SHA (primeros 7 chars)
      placeholder: "a1b2c3d"
    validations:
      required: true
  - type: input
    id: rol
    attributes:
      label: Rol(es) con los que probaste
      placeholder: "super_admin, colaborador, RH (director)"
    validations:
      required: true
  - type: input
    id: env-url
    attributes:
      label: URL del entorno de pruebas
      placeholder: "http://127.0.0.1:3005 o VPS/LAN"
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / dispositivo + version
      placeholder: "Chrome 142 (desktop), Safari iOS 18 (movil)"
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ## Acceptance criteria - 30 puntos
        Cada check pasa tal cual esta descrito o se documenta abajo como hallazgo.
  - type: checkboxes
    id: ac-auth
    attributes:
      label: "Autenticacion, sesion y roles (4)"
      options:
        - label: "1. Login valido entra y redirige; invalido muestra error generico (sin revelar si el correo existe) y bloquea tras varios intentos; el cambio de contrasena se fuerza en el primer ingreso"
        - label: "2. Cerrar sesion invalida el token (el viejo deja de servir) y redirige a login; el auto-refresh en 401 mantiene la sesion sin re-login"
        - label: "3. (F5) El refresh dura 7 dias y rota en cada uso: un usuario activo NO se desloguea; uno inactivo mas de 7 dias vuelve a iniciar sesion"
        - label: "4. Permisos por rol: un colaborador NO ve Administracion ni botones de gestion; RH ve sus bandejas; cada accion restringida responde 403 en el backend, no solo se oculta"
  - type: checkboxes
    id: ac-responsive
    attributes:
      label: "Responsivo movil (4)"
      options:
        - label: "5. En movil NO hay scroll horizontal en ninguna seccion: nada se sale a la derecha ni queda cortado; todo centrado y completo (revisar todas las paginas a ~360-414px)"
        - label: "6. Header movil: logo a la izquierda, campana y hamburguesa a la derecha, buscador oculto; el drawer trae el perfil arriba, la navegacion por secciones y las acciones de cuenta"
        - label: "7. Footer compacto (2 columnas) y las ventanas flotantes ocupan casi todo el ancho, con scroll interno, Cancelar oculto (se cierra con la X) y el boton principal a lo ancho"
        - label: "8. Botones, textos, imagenes, tablas y contenedores se ven bien en movil (tablas como tarjetas o con scroll propio, grids a 1 columna); en escritorio todo queda IGUAL que antes"
  - type: checkboxes
    id: ac-inicio
    attributes:
      label: "Inicio, Noticias y Reconocimientos (3)"
      options:
        - label: "9. Inicio con datos reales (novedades, pendientes, cumpleanos, reconocimientos); los botones del hero quedan en una linea sin recortes en movil"
        - label: "10. Noticias: solo publicadas para todos (borradores y programadas solo editores); crear/editar (portada, categoria, adjuntos, programacion) funciona; las vistas solo suben en noticias visibles (F4)"
        - label: "11. Reconocimientos: publicar con regalo (sin auto-publicar con Enter) y aprobacion de RH; muro y destacado correctos; en movil pestanas sin scroll y botones lado a lado"
  - type: checkboxes
    id: ac-personas
    attributes:
      label: "Directorio, Organigrama, Areas y Cumpleanos (3)"
      options:
        - label: "12. Directorio: el buscador filtra por nombre, puesto o area (a lo ancho en movil); muestra activos reales con foto; exportar CSV, imprimir y la ficha lateral funcionan"
        - label: "13. Organigrama se reacomoda en movil sin desbordes; Areas: detalle (avisos y equipo), subir archivo exige Coordinador o superior (colaborador recibe 403, F4) y el boton queda a lo ancho"
        - label: "14. Cumpleanos: del mes, proximos y aniversarios cargan; el selector de mes y las pestanas se ven bien en movil; felicitar funciona"
  - type: checkboxes
    id: ac-participacion
    attributes:
      label: "Encuestas, Evaluaciones, Quejas y Sugerencias (4)"
      options:
        - label: "15. Encuestas: crear (2 pasos), responder y ver resultados segun permisos; en movil el modal no desborda y las tarjetas no se salen al agregar"
        - label: "16. Evaluaciones: crear por pasos (en movil el stepper muestra un paso a la vez), adjuntar y enviar el archivo contestado, y el flujo 360 avanza a la siguiente pendiente"
        - label: "17. Quejas: enviar (anonima o identificada) con evidencia; solo RH y Gerencia la ven; seguimiento (hilo e historial) y cambio de estado/prioridad funcionan"
        - label: "18. Sugerencias: enviar y votar, moderar estado; en movil el pie de la tarjeta se apila ordenado y el header apila con el boton a lo ancho"
  - type: checkboxes
    id: ac-documentos
    attributes:
      label: "Politicas, Reglamento, Convenios e Identidad (4)"
      options:
        - label: "19. Politicas: crear/editar con visibilidad (rol, area, personas) y adjuntos; el detalle, el historial de versiones, el acuse y los adjuntos respetan la visibilidad (403 para quien no la puede ver, F2)"
        - label: "20. Reglamento: el visor arma el indice por articulos numerados; en movil el indice va arriba (tarjeta), luego los articulos, las acciones y el cumplimiento"
        - label: "21. Convenios: tarjetas (destacado, beneficio, vigencia, contacto, logo) y visor; en movil el titulo cabe en una linea y el modal de edicion no se amontona"
        - label: "22. Identidad: mision, vision, valores, objetivos, historia y multimedia se ven; el modal Editar no amontona los repetidores en movil"
  - type: checkboxes
    id: ac-aprendizaje
    attributes:
      label: "Recursos, Cursos, Guia y Primeros pasos (3)"
      options:
        - label: "23. Recursos: en movil el buscador queda con solo el icono de filtro a la derecha; tocar Categorias abre el panel justo debajo y resalta el boton; articulos, FAQ y plantillas funcionan"
        - label: "24. Cursos: catalogo, material adjunto, marcar completado y progreso; Guia Intranet: el temario por modulos es acordeon en movil (plegar y expandir)"
        - label: "25. Mis primeros pasos muestra el progreso y cada paso lleva a su seccion"
  - type: checkboxes
    id: ac-admin
    attributes:
      label: "Administracion y Notificaciones (2)"
      options:
        - label: "26. Administracion: la tabla de usuarios carga (crear, cambiar rol, activar/desactivar, reset de contrasena, acciones masivas); en movil se ve como tarjetas apiladas; sync Odoo, analitica y auditoria cargan y avisan si algo falla"
        - label: "27. Notificaciones (campana): por rol (super admin ve todo; regalos, quejas y sugerencias solo a RH por puesto); en movil el panel abre a lo ancho bajo el header"
  - type: checkboxes
    id: ac-seguridad
    attributes:
      label: "Seguridad (fixes F1 a F5) (3)"
      options:
        - label: "28. (F1) GET /docs/policy_1.pdf devuelve 404; los PDF de politicas usan nombre aleatorio no enumerable (no se descarga por adivinanza el PDF de una politica restringida)"
        - label: "29. (F2 y F4) Historial, acuse y adjuntos de una politica restringida dan 403 sin acceso; subir un .svg da 400; POST news/{id}/view en borrador da 404; departments/upload con colaborador da 403"
        - label: "30. (F3 y F5) pip-audit (backend) y npm audit --omit=dev (frontend) en 0 vulnerabilidades y la app funciona igual tras el upgrade; el refresh corto (7 dias) no desloguea a usuarios activos"
  - type: dropdown
    id: result
    attributes:
      label: "Resultado global del QA"
      options:
        - "Aprobado para produccion"
        - "Aprobado con observaciones menores (anotar abajo)"
        - "Rechazado, requiere correcciones (anotar abajo)"
    validations:
      required: true
  - type: textarea
    id: findings
    attributes:
      label: "Hallazgos / observaciones"
      description: "Para cada criterio que NO paso: numero del check, rol y dispositivo, que esperabas, que paso y pasos para reproducir. Si hay bugs grandes, abre issues separados y referencialos."
      placeholder: "- [#5 responsive] En reconocimientos la tarjeta se corre a la derecha en iPhone."
      render: markdown
    validations:
      required: false
  - type: input
    id: time-spent
    attributes:
      label: "Tiempo aproximado del QA"
      placeholder: "3h"
    validations:
      required: false
