name: 🧪 QA Review — German Labs (tienda en línea)
description: "Revisión de QA del e-commerce German Labs (Next.js + FastAPI + PostgreSQL + Stripe + Odoo + bot GermanBot con RAG/Gemini). 35 criterios específicos de este proyecto — NO usar en otros repos."
title: "[QA][german-labs] <feature/sprint que estás probando>"
labels:
  - qa
body:
  # ─── 1. Contexto de la prueba ──────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 📋 Contexto de esta sesión de QA
        Llena estos campos antes de empezar. Si algo no aplica, escribe N/A.
        Antes de marcar checks, **abre la web y reproduce cada flujo en orden** — no copies de un QA anterior.
        Usa SIEMPRE datos de prueba (tarjeta Stripe `4242 4242 4242 4242`, cuentas de QA) y verifica Odoo en la instancia de **DESARROLLO**.
        Arquitectura: frontend Next (puerto **3002**) → backend FastAPI (puerto **8003**) → Postgres `german_labs` + Odoo (lista de precios **PREFERENTE**, por SKU `PTGML0x`) + Stripe + KeyVault/Gemini para el bot **GermanBot**.

  - type: input
    id: branch
    attributes:
      label: Rama probada
      description: ¿Sobre qué rama corres el QA?
      placeholder: "dev / main"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA (primeros 7 chars)
      description: Para reproducir exactamente lo que probaste
      placeholder: "a1b2c3d"
    validations:
      required: true

  - type: input
    id: env-url
    attributes:
      label: URL del entorno de pruebas
      placeholder: "http://localhost:3002 o URL del VPS de pruebas"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / dispositivo + versión
      placeholder: "Chrome 142 (desktop), Safari iOS 18 (móvil)"
    validations:
      required: false

  # ─── 2. Acceptance criteria (35 checks) ─────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance criteria — 35 puntos. Lo que sí rompe, rompe el negocio

  - type: checkboxes
    id: ac-auth
    attributes:
      label: 🔐 Autenticación y cuenta (4)
      options:
        - label: "1. Login con credenciales válidas entra y redirige; con inválidas muestra error genérico (sin filtrar si el correo existe) y bloquea la cuenta tras 5 intentos fallidos (lockout temporal)"
        - label: "2. Registro NO crea el usuario en `users` hasta verificar el correo: queda como registro EN ESPERA (tabla pending_registrations con caducidad); un registro abandonado o con datos chafa nunca contamina la tabla de usuarios"
        - label: "3. El correo de verificación abre /verificar-correo, AHÍ se crea el usuario real (ya verificado) e inicia sesión automáticamente; reenviar verificación regenera el enlace y funciona (incluye cuentas viejas no verificadas)"
        - label: "4. Recuperar contraseña (/restablecer-password) completa el flujo con código de 6 dígitos por correo; logout invalida el JWT (el token viejo deja de servir) y redirige a inicio"

  - type: checkboxes
    id: ac-catalogo
    attributes:
      label: 🛍️ Catálogo y producto (3)
      options:
        - label: "5. La Tienda carga los productos con precio y stock REALES de Odoo (lista PREFERENTE, por SKU `PTGML0x`); ningún producto en $0; un SKU con stock 0 en Odoo se refleja como agotado (sync al arranque y cada 5 min)"
        - label: "6. El detalle del producto muestra galería, Descripción (de WP), Beneficios (derivados sin inventar), Uso seguro (sin dosis) y, en ciclos, los activos incluidos; los Productos Relacionados se llenan hasta 4 sin repetir"
        - label: "7. Las imágenes de producto cargan desde /images/productos/** (sin imágenes rotas) y \"Agregar al carrito\" funciona con la animación de burbuja que vuela al carrito"

  - type: checkboxes
    id: ac-ciclos
    attributes:
      label: 🧪 Ciclos y promociones armables (3)
      options:
        - label: "8. En ciclos (Volumen/Definición) y la promo de 15 activos aparece el SELECTOR DE CANTIDADES (− 0 +) con \"Selecciona N piezas en total\" y \"Total X/N\"; el botón Agregar se BLOQUEA hasta completar todas las piezas"
        - label: "9. Los productos elegidos del ciclo viajan al carrito y se muestran ORDENADOS (Producto 1…N / Activo 1…N), no en el orden en que se eligieron"
        - label: "10. El precio del ciclo/promo es fijo (no la suma de componentes) y coincide en tienda, detalle, carrito y checkout"

  - type: checkboxes
    id: ac-carrito
    attributes:
      label: 🛒 Carrito y envío (4)
      options:
        - label: "11. El drawer del carrito abre desde el header en cualquier página; cambiar cantidad / eliminar / vaciar recalcula el subtotal al instante"
        - label: "12. Al agregar un producto, la burbuja vuela al ícono del carrito y el carrito se abre AL LLEGAR la burbuja (no antes); el contador hace su rebote"
        - label: "13. El carrito de invitado (localStorage) persiste al recargar la página y se fusiona al iniciar sesión"
        - label: "14. Envío: GRATIS desde $1,250 MXN, $200 en compras menores — el total mostrado en el front cuadra EXACTO con el que recalcula el backend (server-side), sin excepciones"

  - type: checkboxes
    id: ac-checkout
    attributes:
      label: 💳 Checkout y pago (4)
      options:
        - label: "15. Estando logueado, el checkout PRELLENA email y nombre, y teléfono + dirección si hay una guardada; la búsqueda de dirección (Google Places vía KeyVault) autocompleta calle/colonia/CP/ciudad/estado"
        - label: "16. El precio y el envío se recalculan SERVER-SIDE desde la BD/Odoo (por SKU): un carrito manipulado en el cliente NO puede cambiar el monto a cobrar"
        - label: "17. Pago con tarjeta de PRUEBA (4242…) vía Stripe (Elements) confirma el pago por webhook, marca el pedido pagado, muestra el número de pedido y limpia el carrito; en TODA la pasarela /checkout NO se muestra el footer"
        - label: "18. En el resumen del checkout, los ciclos muestran sus productos elegidos (ordenados); una tarjeta rechazada permite reintentar. Solo hay pago con tarjeta Stripe (no SPEI/OXXO)"

  - type: checkboxes
    id: ac-pedidos-odoo
    attributes:
      label: 📦 Pedidos y sincronización con Odoo (4)
      options:
        - label: "19. El pedido pagado queda en la BD propia (orders/order_items) con su número, estado \"pagado\" y los productos/atributos/precios correctos (releídos de la BD, no del cliente)"
        - label: "20. El pedido pagado se empuja a Odoo como sale.order en BORRADOR con contexto MENUDEO (compañía 1, equipo 5, sucursal 2, unidad 4) y dirección de ENTREGA por pedido (partner_shipping_id); el total cuadra EXACTO"
        - label: "21. Un ciclo/promo se manda a Odoo EXPANDIDO en sus vials elegidos (líneas individuales por SKU, con el precio del ciclo repartido por pieza), no como una línea sin SKU que se omite"
        - label: "22. /panel/pedidos lista los pedidos del usuario con auto-actualización y estado correcto; el detalle muestra los productos del ciclo (\"Productos incluidos\") y el tracking refleja las guías de Odoo (guía única o tabla x_studio_guias) con su paquetería"

  - type: checkboxes
    id: ac-perfil
    attributes:
      label: 👤 Mi perfil — pestañas (4)
      options:
        - label: "23. Perfil: muestra nombre, correo y teléfono REALES del backend; el correo está bloqueado; guardar persiste en la BD y se refleja; el teléfono valida 10 dígitos (o vacío) y NO se borra en silencio al guardar"
        - label: "24. Avatar: las 3 opciones de marca (isotipo verde/blanco/oscuro) son distintas y se guardan; subir imagen (≤5MB) funciona y se refleja en navbar/sidebar; en el header se ve la inicial/foto cuando hay sesión"
        - label: "25. Direcciones: agregar / editar / eliminar / predeterminar funcionan y persisten; \"Descargar comprobante (PDF)\" (solo pedidos pagados) genera el comprobante con productos, totales, dirección y método de pago"
        - label: "26. Soporte y Dashboard: enviar ticket funciona y aparece en la lista; los datos del resumen son reales; los errores se muestran con aviso (toast) — no se pierde feedback; todos los botones/enlaces del panel funcionan"

  - type: checkboxes
    id: ac-validacion
    attributes:
      label: 🛡️ Validación de folio (2)
      options:
        - label: "27. La pestaña Validación verifica el folio CONTRA WordPress (proxy real, mismos códigos y conteos): un folio inexistente da \"no encontrado\", uno real da \"auténtico\" con su conteo X/2 y fecha, y uno agotado da \"agotado\""
        - label: "28. El diseño de Validación es el certificado claro (fondo blanco con iluminación verde, formulario funcional) y NO usa el endpoint falso/regex anterior"

  - type: checkboxes
    id: ac-bot
    attributes:
      label: 🤖 Asistente GermanBot (RAG) (4)
      options:
        - label: "29. GermanBot se presenta con ese nombre (no \"Beartriix\"/\"Max\") y responde con info REAL del sitio (productos, precios, envíos, pagos, marca) recuperada por RAG; no inventa precios, ingredientes ni promociones"
        - label: "30. Al preguntar por productos muestra TARJETAS con precio/stock en vivo y enlaces /producto/{slug} que NO dan 404; las cards aparecen al terminar la respuesta"
        - label: "31. Al pedir ver/abrir un producto concreto (ver_producto), navega a su página de detalle de inmediato SIN cerrar el chat; agregar al carrito desde el bot funciona"
        - label: "32. NO da dosis ni consejo médico (deriva a un profesional de la salud) y maneja insultos al bot con una ADVERTENCIA firme y respetuosa, sin insultar de vuelta"

  - type: checkboxes
    id: ac-correos-marca
    attributes:
      label: ✉️ Correos, contenido y marca (3)
      options:
        - label: "33. Llegan los correos transaccionales branded German Labs (verificación, código de recuperación, pago confirmado) vía el SMTP propio; encabezado/colores German Labs (verde), SIN textos ni dominios de \"Veteriix/Pharma\""
        - label: "34. NO existe NINGUNA referencia a la marca vieja en toda la web (Veteriix/Veterix/Pharma/EQUIVET) ni en textos, imágenes, logos, favicon, correos o número de pedido; el módulo de Distribuidores está eliminado (sin ruta ni enlaces)"
        - label: "35. Blog, Nosotros y páginas legales (/politica-privacidad, /terminos-condiciones, /politica-reembolso) cargan con contenido German Labs e imágenes correctas (sin marcas ajenas)"

  # ─── 3. Resultado global ────────────────────────────────────────────
  - type: dropdown
    id: result
    attributes:
      label: 🎯 Resultado global del QA
      options:
        - "✅ Aprobado para producción"
        - "⚠️ Aprobado con observaciones menores (anotar abajo)"
        - "❌ Rechazado — requiere correcciones (anotar abajo)"
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: 🔍 Hallazgos / observaciones
      description: |
        Para cada criterio que NO pasó, describe:
        - Número del check y qué probaste
        - Qué esperabas
        - Qué pasó realmente
        - Pasos para reproducir
        Si encuentras bugs grandes, abre issues SEPARADOS (uno por bug) y referencia desde acá.
      placeholder: |
        Ejemplo:
        - [#7 catálogo] Las imágenes de un producto salen rotas. Reproducible en Chrome. Issue: #42
        - [#20 odoo] La cotización quedó $0.01 abajo del pedido en envío gratis.
      render: markdown
    validations:
      required: false

  - type: input
    id: time-spent
    attributes:
      label: ⏱️ Tiempo aproximado del QA
      placeholder: "2h"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Recuerda probar con datos de PRUEBA (Stripe test `4242 4242 4242 4242`, cuentas de QA). No uses tarjetas reales ni datos personales reales en el ambiente de pruebas, y verifica Odoo en la instancia de DESARROLLO. Ningún cambio va directo a producción sin pasar por el VPS de pruebas. Pendiente conocido: si se quiere correo con dominio propio (no Gmail), configurar Resend (`RESEND_API_KEY`) con el dominio germanlabs.com.mx verificado.*
