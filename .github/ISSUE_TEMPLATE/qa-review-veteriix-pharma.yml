name: 🧪 QA Review — Veteriix Pharma (solo aplica a este repo)
description: "Revisión de QA del e-commerce Veteriix Pharma. Los criterios son específicos de esta web — NO usar en otros repos de la org."
title: "[QA][veteriix-pharma] <feature/sprint que estás probando>"
labels:
  - qa
body:
  # ─── 1. Contexto de la prueba ──────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 📋 Contexto de esta sesión de QA
        Llena estos campos antes de empezar. Si algo no aplica, escribe N/A.

  - type: input
    id: branch
    attributes:
      label: Rama probada
      description: ¿Sobre qué rama corres el QA?
      placeholder: "merge"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA (primeros 7 chars)
      description: Para poder reproducir exactamente lo que probaste
      placeholder: "a1b2c3d"
    validations:
      required: true

  - type: input
    id: env-url
    attributes:
      label: URL del entorno de pruebas (frontend)
      placeholder: "http://localhost:3000 o https://qa.veteriixpharma.com"
    validations:
      required: false

  - type: input
    id: api-url
    attributes:
      label: URL del backend / API
      placeholder: "http://localhost:8000/api"
    validations:
      required: false

  - type: input
    id: stripe-mode
    attributes:
      label: Modo de Stripe
      description: ¿Probaste con llaves de test o live?
      placeholder: "test (pk_test_...)"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / dispositivo + versión
      placeholder: "Chrome 142, Safari iOS 18, Android Chrome"
    validations:
      required: false

  # ─── 2. Acceptance criteria críticos ────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance criteria — lo que SI rompe, rompe el negocio

  - type: checkboxes
    id: ac-auth
    attributes:
      label: 🔐 Autenticación y sesión
      options:
        - label: Login con credenciales válidas funciona y redirige al panel
        - label: Login con credenciales inválidas devuelve error claro (sin filtrar si el correo existe)
        - label: Registro de cuenta nueva funciona y deja la sesión iniciada
        - label: Logout cierra la sesión y redirige a /login
        - label: Sesión expirada / token inválido redirige a /login automáticamente
        - label: Rutas del panel (/panel/*) redirigen a /login si no hay token
        - label: Rate limit en /api/auth/login bloquea tras varios intentos seguidos (5/min)

  - type: checkboxes
    id: ac-terms
    attributes:
      label: 📜 Términos y Condiciones
      options:
        - label: Un usuario nuevo ve la casilla de Términos y NO puede iniciar sesión sin marcarla
        - label: Los enlaces a Términos y Aviso de Privacidad abren las páginas correctas
        - label: Tras aceptar e iniciar sesión, la aceptación queda guardada en el servidor (meta del cliente)
        - label: Al volver a entrar (mismo usuario), ya NO se le pide aceptar de nuevo
        - label: Ya NO aparece la opción "Mantener sesión iniciada"

  - type: checkboxes
    id: ac-password-reset
    attributes:
      label: 🔑 Recuperar contraseña
      options:
        - label: '"¿Olvidaste tu contraseña?" abre el modal y valida el correo'
        - label: El correo de restablecimiento LLEGA (revisar bandeja y spam)
        - label: El enlace abre /restablecer-password con el token
        - label: Token inválido/expirado muestra mensaje claro y permite pedir uno nuevo
        - label: Cambiar la contraseña funciona y permite iniciar sesión con la nueva
        - label: Las contraseñas que no coinciden o <6 caracteres muestran error

  - type: checkboxes
    id: ac-checkout
    attributes:
      label: 💳 Checkout y pago con Stripe
      options:
        - label: El formulario de pago de Stripe carga sin error (publishable key configurada)
        - label: Se crea el PaymentIntent del pedido correctamente
        - label: Pago con tarjeta de prueba aprobada (4242 4242 4242 4242) se procesa OK
        - label: Tras el pago, el pedido pasa de "pendiente de pago" a "procesando" (vía webhook de Stripe)
        - label: Pago rechazado muestra error y NO marca el pedido como pagado
        - label: El total, envío y productos del pedido coinciden con el carrito
        - label: Envío gratis se aplica en compras mayores a $1,200 MXN

  - type: checkboxes
    id: ac-store
    attributes:
      label: 🛒 Tienda, productos y carrito
      options:
        - label: Los productos cargan desde WooCommerce en /tienda y en el home
        - label: El filtro por categorías funciona
        - label: La página de producto /producto/[slug] muestra datos, imágenes y precio correctos
        - label: 'Badge de stock: "En stock" / "Agotado" según WooCommerce'
        - label: 'Aviso "¡Solo quedan X!" aparece cuando el stock es ≤ 5'
        - label: Agregar al carrito, cambiar cantidad y quitar productos funciona
        - label: El carrito persiste al recargar la página
        - label: Producto agotado deshabilita el botón "Agregar al carrito"

  - type: checkboxes
    id: ac-cycles
    attributes:
      label: 🔁 Ciclos
      options:
        - label: El carrusel de ciclos funciona (arrastrar / flechas / autoplay)
        - label: La página /ciclo/[slug] muestra el ciclo, productos incluidos y precio
        - label: '"Agregar Ciclo Completo" agrega todos los productos al carrito'

  - type: checkboxes
    id: ac-orders
    attributes:
      label: 📦 Pedidos y panel del cliente
      options:
        - label: El cliente ve sus pedidos con el estado correcto en /panel/pedidos
        - label: Cancelar un pedido (dentro de 24h) responde de inmediato y lo marca como cancelado
        - label: No se puede cancelar un pedido fuera del plazo de 24h
        - label: Pedido "enviado" muestra el botón/enlace de rastreo
        - label: Confirmar entrega funciona y actualiza el estado
        - label: Las estadísticas del panel (/panel) cuadran con los pedidos reales

  - type: checkboxes
    id: ac-blog
    attributes:
      label: 📝 Blog
      options:
        - label: /blog lista los artículos y el filtro por categorías funciona
        - label: Cada artículo /blog/[slug] abre y muestra contenido, imagen y "Sigue leyendo"
        - label: Las imágenes del blog cargan (WebP) y no se ven rotas
        - label: La barra de progreso de lectura y la tabla de contenidos funcionan
        - label: El botón de compartir del artículo funciona (share nativo o copiar enlace)
        - label: El link "Blog" aparece en el navbar (desktop y móvil)

  - type: checkboxes
    id: ac-share
    attributes:
      label: 🔗 Compartir
      options:
        - label: Botón de compartir en cards de producto, promociones y ciclos funciona
        - label: Botón de compartir en páginas de producto y ciclo funciona
        - label: En móvil abre el share nativo; en escritorio copia el enlace con confirmación
        - label: Compartir dentro de una card NO dispara la navegación al producto

  - type: checkboxes
    id: ac-notifications
    attributes:
      label: 🔔 Notificaciones
      options:
        - label: Al cambiar el estado de un pedido se genera la notificación correcta (pago aprobado, enviado, entregado, cancelado)
        - label: La suscripción a notificaciones push se puede activar (móvil/escritorio compatible)
        - label: La campana de notificaciones muestra el conteo de no leídas
        - label: Ya NO aparecen notificaciones de "timer de pago" (5min/10min/1hr/24hr del flujo WhatsApp eliminado)

  - type: checkboxes
    id: ac-distribuidores
    attributes:
      label: 🤝 Distribuidores
      options:
        - label: La página /distribuidores carga y el formulario envía la solicitud
        - label: El carrusel de distribuidores se muestra correctamente
        - label: Se recibe confirmación / el envío reporta éxito

  - type: checkboxes
    id: ac-chatbot
    attributes:
      label: 🤖 Chatbot / asistente
      options:
        - label: El chatbot abre y responde a preguntas básicas
        - label: Las respuestas sobre productos/ciclos son coherentes con el catálogo
        - label: No expone información sensible ni credenciales en sus respuestas

  - type: checkboxes
    id: ac-seo
    attributes:
      label: 🔍 SEO
      options:
        - label: Cada página pública tiene título y descripción propios
        - label: Las páginas públicas tienen canonical (sin duplicados)
        - label: /sitemap.xml incluye home, tienda, productos, ciclos y blog
        - label: /robots.txt bloquea /panel, /checkout, /login y /registro
        - label: Los datos estructurados (JSON-LD) están presentes en producto, ciclo y artículos de blog

  - type: checkboxes
    id: ac-security
    attributes:
      label: 🛡️ Seguridad
      options:
        - label: Rutas protegidas redirigen a /login si no hay token
        - label: Errores 500 NO devuelven stack traces ni rutas internas
        - label: Las respuestas de error siguen incluyendo headers CORS (no se rompe el front)
        - label: Headers de seguridad presentes (HSTS, X-Frame-Options, X-Content-Type-Options)
        - label: No hay llaves/secretos expuestos en el frontend (solo la publishable key de Stripe, que es pública)

  - type: checkboxes
    id: ac-perf
    attributes:
      label: ⚡ Performance
      options:
        - label: El home y la tienda cargan en un tiempo aceptable (cold < 5s, warm < 1.5s)
        - label: Las imágenes se sirven optimizadas (WebP/AVIF) y no pesan de más
        - label: No hay errores en la consola del navegador en las páginas principales
        - label: La web es usable en móvil (navbar, carrusel, checkout)

  # ─── 3. Resultado global ────────────────────────────────────────────
  - type: dropdown
    id: result
    attributes:
      label: 🎯 Resultado global del QA
      options:
        - "✅ Aprobado para producción"
        - "⚠️ Aprobado con observaciones menores (anotar abajo)"
        - "❌ Rechazado — requiere correcciones (anotar abajo)"
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: 🔍 Hallazgos / observaciones
      description: |
        Para cada criterio que NO pasó, describe:
        - Qué probaste
        - Qué esperabas
        - Qué pasó realmente
        - Pasos para reproducir
        Si encuentras bugs grandes, abre issues SEPARADOS (uno por bug) y referencia desde acá.
      placeholder: |
        Ejemplo:
        - [Checkout] Tras pagar con 4242…, el pedido se quedó en "pendiente". Falta configurar el webhook de Stripe en el entorno. Issue: #42
        - [Blog] La imagen del artículo "pureza" no carga en Safari iOS. Reproducible en iPhone. Issue: #43
      render: markdown
    validations:
      required: false

  - type: input
    id: time-spent
    attributes:
      label: ⏱️ Tiempo aproximado del QA
      placeholder: "1h 30min"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Recuerda: bugs grandes van como issues separados (uno por bug) y se referencian desde "Hallazgos".*
