name: 🧪 QA Review — Veteriix Pharma (tienda en línea)
description: "Revisión de QA del e-commerce Veteriix Pharma (Next.js 14 + FastAPI + PostgreSQL + Stripe + Odoo + bot Beartriix con RAG). 30 criterios específicos de este proyecto — NO usar en otros repos."
title: "[QA][veteriix] <feature/sprint que estás probando>"
labels:
  - qa
body:
  # ─── 1. Contexto de la prueba ──────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 📋 Contexto de esta sesión de QA
        Llena estos campos antes de empezar. Si algo no aplica, escribe N/A.
        Antes de marcar checks, **abre la web y reproduce cada flujo en orden** — no copies de un QA anterior.
        Usa SIEMPRE datos de prueba (tarjeta Stripe 4242 4242 4242 4242, cuentas de QA). Verifica Odoo en la instancia de DESARROLLO.

  - type: input
    id: branch
    attributes:
      label: Rama probada
      description: ¿Sobre qué rama corres el QA?
      placeholder: "dev-edgar / main"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA (primeros 7 chars)
      description: Para reproducir exactamente lo que probaste
      placeholder: "a1b2c3d"
    validations:
      required: true

  - type: input
    id: env-url
    attributes:
      label: URL del entorno de pruebas
      placeholder: "http://localhost:3002 o URL del VPS de pruebas"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / dispositivo + versión
      placeholder: "Chrome 142 (desktop), Safari iOS 18 (móvil)"
    validations:
      required: false

  # ─── 2. Acceptance criteria (30 checks) ─────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance criteria — 30 puntos. Lo que si rompe, rompe el negocio

  - type: checkboxes
    id: ac-auth
    attributes:
      label: 🔐 Autenticación y cuenta (4)
      options:
        - label: "1. Login con credenciales válidas entra y redirige; con inválidas muestra error genérico (sin filtrar si el correo existe) y bloquea tras 5 intentos fallidos"
        - label: "2. Registro crea la cuenta, exige aceptar Términos y Aviso de Privacidad y envía correo de verificación; NO se puede iniciar sesión hasta verificar el correo"
        - label: "3. \"Continuar con Google\" completa el inicio de sesión y el usuario nuevo llega con su panel vacío"
        - label: "4. Recuperar contraseña completa el flujo con código de 6 dígitos por correo; logout cierra sesión y el token deja de servir (auto-refresh ante 401 funciona)"

  - type: checkboxes
    id: ac-catalogo
    attributes:
      label: 🛍️ Catálogo y producto (3)
      options:
        - label: "5. /tienda carga las cards desde Postgres con precio y stock REALES de Odoo (lista PREFERENTE); ningún producto sin imagen ni con precio en $0"
        - label: "6. Buscador, filtros (Todos/Volumen/Definición) y orden (recientes/precio/populares/valorados) filtran y reordenan correctamente"
        - label: "7. El detalle del producto (/producto/slug) muestra galería e info, y \"Agregar al carrito\" funciona y abre/actualiza el carrito"

  - type: checkboxes
    id: ac-ciclos
    attributes:
      label: 🎁 Ciclos y promociones (3)
      options:
        - label: "8. Los ciclos (/ciclo/slug) muestran su precio compuesto (precio_ciclo, NO el de Odoo) y se arman en su propia página; NO se agregan como producto individual"
        - label: "9. Las promociones son paquetes armables donde el cliente elige sus productos; marcan envío gratis"
        - label: "10. El front detecta cuando el carrito coincide con un ciclo y ofrece convertirlo; el precio del ciclo se reparte correctamente entre sus productos"

  - type: checkboxes
    id: ac-carrito
    attributes:
      label: 🛒 Carrito (3)
      options:
        - label: "11. El drawer abre desde el header en cualquier página; cambiar cantidad / eliminar / vaciar recalcula el subtotal al instante"
        - label: "12. Carrito de invitado (localStorage) persiste al recargar; al iniciar sesión se FUSIONA con el de la cuenta (Postgres) sin perder ni duplicar ítems"
        - label: "13. Envío: GRATIS desde $1,250 MXN (y en promociones); $200 en compras menores — el total del front cuadra EXACTO con el del backend, sin excepciones"

  - type: checkboxes
    id: ac-checkout
    attributes:
      label: 💳 Checkout y pago (4)
      options:
        - label: "14. Los datos de contacto (correo, nombre, teléfono) vienen de la cuenta y NO son editables en el checkout (solo en Perfil); el teléfono es +52 a 10 dígitos y se puede llenar si falta"
        - label: "15. El buscador de dirección (KeyVault→Google Places) autollena calle/número/colonia/CP/ciudad/estado; \"Entre calles\" es manual y OBLIGATORIO; la ciudad se normaliza (León, NUNCA \"León de los Aldama\")"
        - label: "16. Pago con tarjeta de PRUEBA (4242…) vía Stripe redirige a éxito con número de pedido; tarjeta rechazada muestra error con opción de reintentar. NO hay SPEI/OXXO: solo tarjeta Stripe"
        - label: "17. El pedido pagado se empuja a Odoo como sale.order en BORRADOR con contexto MENUDEO (compañía 1, equipo 5, almacén 9, sucursal 2) y dirección de entrega por pedido; total EXACTO sin centavos de diferencia"

  - type: checkboxes
    id: ac-pedidos
    attributes:
      label: 📦 Mis pedidos (3)
      options:
        - label: "18. /panel/pedidos lista los pedidos con auto-actualización (al volver a la pestaña y cada 60s); estados correctos (pendiente/pagado/procesando/enviado/entregado)"
        - label: "19. La línea de tiempo de rastreo marca los pasos correctos y muestra guía(s) múltiple(s) y paquetería con enlace cuando el pedido se envía (sync desde Odoo x_studio_guias)"
        - label: "20. \"Descargar comprobante (PDF)\" (solo en pedidos pagados) genera el comprobante con productos, totales, dirección y método de pago — aclarando que NO es factura fiscal (CFDI)"

  - type: checkboxes
    id: ac-cuenta
    attributes:
      label: 👤 Mi cuenta — pestañas (4)
      options:
        - label: "21. Perfil: nombre y teléfono guardan en BD; el correo está bloqueado; el avatar (animal o foto subida ≤5MB, comprimida) se guarda en BD y se refleja al instante en navbar/sidebar"
        - label: "22. Direcciones: la libreta soporta agregar/editar/eliminar (con confirmación) y \"Marcar como predeterminada\" (exclusiva); al borrar la predeterminada otra hereda el flag; al hacer un pedido la dirección se guarda en el perfil"
        - label: "23. Soporte: enviar un ticket lo crea en BD con nombre/correo reales del usuario, aparece en \"Mis Tickets\" con estado y fecha, y llega correo de confirmación al cliente + aviso a soporte"
        - label: "24. Dashboard: muestra datos reales (pedidos, gasto) con auto-actualización; todos los botones y enlaces de navegación del panel funcionan"

  - type: checkboxes
    id: ac-bot
    attributes:
      label: 🤖 Asistente Beartriix (RAG) (4)
      options:
        - label: "25. Beartriix responde con información REAL del sitio (envíos, devoluciones, pagos, distribuidores, proceso de compra) recuperada por RAG; no inventa datos ni precios"
        - label: "26. Al preguntar por un producto/categoría/objetivo, muestra TARJETAS de producto con precio y stock reales de Postgres; desde el chat puede agregar productos individuales al carrito (ciclos/promos no, se arman en su página)"
        - label: "27. NO da dosis, uso ni consejo médico (deriva a profesional de la salud) y NO clasifica el producto como humano/veterinario/animal/mascota"
        - label: "28. Si el usuario insulta al bot, responde con ADVERTENCIA escalonada (1ª amable, 2ª firme, 3ª cierre) y NO procesa el insulto como consulta normal"

  - type: checkboxes
    id: ac-correos-forms
    attributes:
      label: ✉️ Correos y formularios (1)
      options:
        - label: "29. Llegan los correos transaccionales (verificación, pago confirmado, pedido enviado, cancelación/reembolso); el formulario de Distribuidores guarda el lead en NUESTRA BD (Postgres) y envía confirmación — no depende de servicios externos"

  - type: checkboxes
    id: ac-seguridad-ux
    attributes:
      label: 🛡️ Seguridad, datos y experiencia móvil (1)
      options:
        - label: "30. Rutas privadas (/panel/*, /checkout) redirigen a login sin sesión; un usuario NO ve pedidos/direcciones/tickets de otro; las respuestas no exponen tokens/llaves/PII ni stack traces; la web completa funciona en móvil (menú, tienda, drawer, checkout, panel, bot) sin overflow ni errores rojos en consola"

  # ─── 3. Resultado global ────────────────────────────────────────────
  - type: dropdown
    id: result
    attributes:
      label: 🎯 Resultado global del QA
      options:
        - "✅ Aprobado para producción"
        - "⚠️ Aprobado con observaciones menores (anotar abajo)"
        - "❌ Rechazado — requiere correcciones (anotar abajo)"
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: 🔍 Hallazgos / observaciones
      description: |
        Para cada criterio que NO pasó, describe:
        - Número del check y qué probaste
        - Qué esperabas
        - Qué pasó realmente
        - Pasos para reproducir
        Si encuentras bugs grandes, abre issues SEPARADOS (uno por bug) y referencia desde acá.
      placeholder: |
        Ejemplo:
        - [#15 checkout] El buscador llenó la ciudad como "León de los Aldama". Reproducible en Chrome. Issue: #42
        - [#17 odoo] La cotización quedó $0.01 abajo del pedido en el ciclo de 6.
      render: markdown
    validations:
      required: false

  - type: input
    id: time-spent
    attributes:
      label: ⏱️ Tiempo aproximado del QA
      placeholder: "2h"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Recuerda probar con datos de PRUEBA (Stripe test 4242 4242 4242 4242, cuentas de QA). No uses tarjetas reales ni datos personales reales en el ambiente de pruebas, y verifica Odoo en la instancia de DESARROLLO. Ningún cambio va directo a producción sin pasar por el VPS de pruebas.*
