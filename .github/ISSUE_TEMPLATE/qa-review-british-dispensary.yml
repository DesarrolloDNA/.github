name: 🧪 QA Review — The British Dispensary (tienda en línea)
description: "Revisión de QA del e-commerce The British Dispensary (Astro SSR + FastAPI + Stripe + Odoo + bot Brit). 40 criterios específicos de este proyecto — NO usar en otros repos."
title: "[QA][british] <feature/sprint que estás probando>"
labels:
  - qa
body:
  # ─── 1. Contexto de la prueba ──────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 📋 Contexto de esta sesión de QA
        Llena estos campos antes de empezar. Si algo no aplica, escribe N/A.
        Antes de marcar checks, **abre la web y reproduce cada flujo en orden** — no copies de un QA anterior.
        Usa SIEMPRE datos de prueba (tarjeta 4242 4242 4242 4242, cuentas de QA).

  - type: input
    id: branch
    attributes:
      label: Rama probada
      description: ¿Sobre qué rama corres el QA?
      placeholder: "QA"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA (primeros 7 chars)
      description: Para reproducir exactamente lo que probaste
      placeholder: "a1b2c3d"
    validations:
      required: true

  - type: input
    id: env-url
    attributes:
      label: URL del entorno de pruebas
      placeholder: "https://testsoft6.dnapp.com.mx"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / dispositivo + versión
      placeholder: "Chrome 142 (desktop), Safari iOS 18 (móvil)"
    validations:
      required: false

  # ─── 2. Acceptance criteria (40 checks) ─────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance criteria — 40 puntos. Lo que si rompe, rompe el negocio

  - type: checkboxes
    id: ac-auth
    attributes:
      label: 🔐 Autenticación y cuenta (4)
      options:
        - label: "1. Login con credenciales válidas entra y redirige; con inválidas muestra error claro (sin filtrar si el correo existe) y bloquea tras 5 intentos fallidos (15 min)"
        - label: "2. Registro crea la cuenta, exige aceptar Términos/Privacidad y envía correo de verificación; las reglas de contraseña aparecen SOLO al empezar a escribir"
        - label: "3. Botón \"Continuar con Google\" (arriba del formulario en login Y registro) completa el inicio de sesión y el usuario nuevo llega con su panel vacío"
        - label: "4. Recuperar contraseña completa el flujo con código de 6 dígitos por correo (vence a los 15 min); logout cierra sesión y el token deja de servir"

  - type: checkboxes
    id: ac-catalogo
    attributes:
      label: 🛍️ Catálogo y producto (4)
      options:
        - label: "5. /productos carga las cards con imagen, precio e inventario REAL de Odoo (etiquetas Disponible / Solo X / Agotado); ningún producto sin imagen"
        - label: "6. El corazón de favoritos togglea desde cualquier card, el badge se actualiza y persiste tras recargar (en BD si hay sesión)"
        - label: "7. Compartir copia el enlace del producto y muestra el toast \"¡Enlace copiado!\""
        - label: "8. El detalle de producto muestra la galería (3 vistas), limita la cantidad al stock real y \"Agregar al carrito\" funciona; relacionados visibles"

  - type: checkboxes
    id: ac-promos
    attributes:
      label: 🎁 Promociones — arma tu combo (3)
      options:
        - label: "9. El modal \"Arma tu combo\" exige llenar EXACTO los slots (contador X/Y); el botón de agregar queda deshabilitado hasta completar"
        - label: "10. El buscador interno y los filtros Todos/Viales/Orales del modal filtran bien; productos agotados no se pueden elegir"
        - label: "11. El combo en el carrito conserva su precio fijo (ej. Triple Poder $1,049), muestra su desglose de productos (y regalo si aplica) y marca envío gratis"

  - type: checkboxes
    id: ac-carrito
    attributes:
      label: 🛒 Carrito (4)
      options:
        - label: "12. El drawer abre desde el header en cualquier página; cambiar cantidad / eliminar / vaciar recalcula el subtotal al instante"
        - label: "13. Carrito de invitado persiste al recargar; al iniciar sesión se FUSIONA con el de la cuenta sin perder ni duplicar ítems"
        - label: "14. Al exceder el stock aparece el aviso ámbar y la cantidad queda capada al disponible (también para usuario autenticado, validado por backend)"
        - label: "15. Envío: GRATIS desde $999 MXN y en promociones; $99 en compras menores — y el total del front cuadra EXACTO con el del backend"

  - type: checkboxes
    id: ac-checkout
    attributes:
      label: 💳 Checkout y pago (5)
      options:
        - label: "16. Los datos de contacto (correo, nombre, teléfono) vienen de la cuenta y NO son editables en el checkout; el teléfono siempre es +52 a 10 dígitos"
        - label: "17. El buscador de dirección sugiere y autollena calle/número/colonia/CP/ciudad/estado; la ciudad se normaliza (León, NUNCA \"León de los Aldama\")"
        - label: "18. La tarjeta \"Usar esta dirección\" solo aparece si hay dirección guardada y llena el formulario al click; sin guardada, los campos inician vacíos"
        - label: "19. Pago con tarjeta de PRUEBA (4242…) redirige a la pantalla de éxito con el número de pedido; tarjeta rechazada lleva a la pantalla de error con opción de reintentar"
        - label: "20. El pedido pagado se crea en Odoo como cotización en BORRADOR con el cliente correcto, almacén VENTAS y total EXACTO (sin centavos de diferencia ni líneas perdidas)"

  - type: checkboxes
    id: ac-pedidos
    attributes:
      label: 📦 Mis pedidos (4)
      options:
        - label: "21. Los pedidos se ven como acordeón (solo el más reciente abierto); el encabezado completo y el botón \"Detalle\" abren/cierran; los botones de acción NO colapsan la tarjeta"
        - label: "22. La línea de tiempo marca los 4 pasos correctos (Recibido → Pago confirmado → En preparación al CONFIRMAR en Odoo → Enviado); al enviarse se ven guía y paquetería con enlace de rastreo"
        - label: "23. \"Descargar recibo\" genera el PDF con productos, totales, dirección y el desglose de combos"
        - label: "24. Pedido pendiente: \"Pagar ahora\" lleva a Stripe y \"Cancelar pedido\" pide confirmación en modal; el cancelado sin pago desaparece de la lista"

  - type: checkboxes
    id: ac-cuenta
    attributes:
      label: 👤 Mi cuenta — pestañas (7)
      options:
        - label: "25. Favoritos: Agregar al carrito, Quitar y \"Mover todo al carrito\" funcionan; al quedar vacío aparece el estado vacío con \"Explorar productos\""
        - label: "26. Arma tu ciclo: elegir objetivo reordena y marca los SUGERIDOS; guardar ciclo (modal con nombre), recomprar en 1 clic y eliminar funcionan contra BD"
        - label: "27. \"Para ti\" muestra recomendaciones personalizadas según compras y favoritos (invitado/nuevo ve destacados); una sola sección, sin duplicados"
        - label: "28. Direcciones: agregar/editar/eliminar (con confirmación) y \"Hacer principal\" funcionan; al borrar la principal, otra hereda el flag"
        - label: "29. Perfil: nombre y teléfono guardan en BD; el correo está bloqueado; el cambio de contraseña exige la actual; un teléfono NO puede repetirse en otra cuenta (error claro)"
        - label: "30. Notificaciones: activar push, botón Probar y los 4 toggles de preferencia persisten en BD; llega push real al cambiar el estado de un pedido"
        - label: "31. Avatar: subir foto (JPG/PNG/WebP ≤2MB) y quitarla funciona; \"Eliminar mi cuenta\" exige escribir ELIMINAR + contraseña + modal final y borra todo (login posterior falla)"

  - type: checkboxes
    id: ac-bot
    attributes:
      label: 🤖 Asistente Brit (4)
      options:
        - label: "32. Brit responde catálogo/categorías/promos con la LISTA COMPLETA y precios reales del inventario (nunca corta en \":\" ni inventa precios)"
        - label: "33. Desde el chat agrega productos y combos al carrito (combo con sus productos elegidos, nunca como sueltos) y se refleja en el drawer"
        - label: "34. NO da dosis ni consejo médico (deriva a profesional de la salud); preguntas fuera de tema redirigen a la tienda con buena onda"
        - label: "35. \"Chatear con Brit\" desde Soporte abre el widget; con sesión reconoce al cliente y el estado de sus pedidos; ante fallo muestra mensaje amable con WhatsApp"

  - type: checkboxes
    id: ac-correos
    attributes:
      label: ✉️ Correos y formularios (3)
      options:
        - label: "36. Llegan los correos transaccionales: verificación de cuenta, confirmación de compra, pedido enviado (con guía) y cancelación"
        - label: "37. Recordatorios automáticos: pago pendiente y carrito abandonado; aviso \"volvió tu favorito\" cuando un agotado se reabastece"
        - label: "38. Los formularios de Soporte (con pedidos reales en el selector y correo precargado), Contacto, Distribuidores y Newsletter (con consentimiento) guardan en BD y llegan al buzón; el historial \"Tus mensajes\" muestra lo enviado"

  - type: checkboxes
    id: ac-seguridad
    attributes:
      label: 🛡️ Seguridad y datos (1)
      options:
        - label: "39. Rutas privadas (/mi-cuenta, /checkout) redirigen a login sin sesión; un usuario NO ve pedidos/datos de otro; las respuestas no exponen tokens, llaves ni stack traces"

  - type: checkboxes
    id: ac-ux
    attributes:
      label: ⚡ Experiencia y rendimiento (1)
      options:
        - label: "40. La web completa se ve y funciona en móvil (menú, tienda, drawer, checkout, mi-cuenta, bot) sin overflow; sin errores rojos en consola; imágenes y modales de la marca (no alerts nativos)"

  # ─── 3. Resultado global ────────────────────────────────────────────
  - type: dropdown
    id: result
    attributes:
      label: 🎯 Resultado global del QA
      options:
        - "✅ Aprobado para producción"
        - "⚠️ Aprobado con observaciones menores (anotar abajo)"
        - "❌ Rechazado — requiere correcciones (anotar abajo)"
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: 🔍 Hallazgos / observaciones
      description: |
        Para cada criterio que NO pasó, describe:
        - Número del check y qué probaste
        - Qué esperabas
        - Qué pasó realmente
        - Pasos para reproducir
        Si encuentras bugs grandes, abre issues SEPARADOS (uno por bug) y referencia desde acá.
      placeholder: |
        Ejemplo:
        - [#17 checkout] El buscador llenó la ciudad como "León de los Aldama". Reproducible en Chrome. Issue: #42
        - [#20 odoo] La cotización quedó $0.01 abajo del pedido en el combo de 6.
      render: markdown
    validations:
      required: false

  - type: input
    id: time-spent
    attributes:
      label: ⏱️ Tiempo aproximado del QA
      placeholder: "2h"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Recuerda probar con datos de PRUEBA (Stripe test 4242 4242 4242 4242, cuentas de QA). No uses tarjetas reales ni datos personales reales en el ambiente de pruebas, y verifica Odoo en la instancia de DESARROLLO.*
