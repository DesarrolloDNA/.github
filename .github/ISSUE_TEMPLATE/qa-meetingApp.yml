name: 🧪 QA Review — MeetingApp
description: "Revisión de QA del sistema de reuniones con IA. Los criterios son específicos del repo — NO usar en otros proyectos de la org."
title: "[QA][meetings] <feature/sprint que estás probando>"
labels:
  - qa
body:
  # ─── 1. Contexto de la prueba ──────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 📋 Contexto de esta sesión de QA
        Llena estos campos antes de empezar. Si algo no aplica, escribe N/A.

  - type: input
    id: branch
    attributes:
      label: Rama probada
      description: ¿Sobre qué rama corres el QA?
      placeholder: "QA"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA (primeros 7 chars)
      description: Para poder reproducir exactamente lo que probaste
      placeholder: "c219405"
    validations:
      required: true

  - type: input
    id: env-url
    attributes:
      label: URL del entorno de pruebas
      placeholder: "https://testsoft2.dnapp.com.mx/"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser + versión
      placeholder: "Chrome 142, Firefox 130, Safari 18"
    validations:
      required: false

  - type: input
    id: admin
    attributes:
      label: Usuario de prueba usado
      description: Email del usuario con el que ejecutaste la mayor parte del QA
      placeholder: "admin@meetings.com"
    validations:
      required: false

  # ─── 2. Acceptance criteria críticos ────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance criteria — features que SI rompen, rompen el negocio

  - type: checkboxes
    id: ac-auth
    attributes:
      label: 🔐 Autenticación y sesión
      options:
        - label: "[AUTH-01] Login con credenciales válidas redirige a /dashboard y muestra avatar/nombre en sidebar"
        - label: "[AUTH-02] Login con password incorrecto muestra 'Credenciales inválidas', NO redirige, NO guarda token"
        - label: "[AUTH-05] Tras 15-20 intentos fallidos con el mismo email devuelve 429 Too Many Requests y bloquea temporalmente"
        - label: "[AUTH-06] F5 en /dashboard mantiene la sesión, no redirige a /login"
        - label: "[AUTH-07] Logout limpia el token de localStorage/cookies y bloquea acceso posterior a /dashboard"
        - label: "[AUTH-08] Usuario con must_change_password=true es forzado a cambiar password en primer login y el flag pasa a false"

  - type: checkboxes
    id: ac-rbac
    attributes:
      label: 🛂 RBAC — Permisos por rol
      options:
        - label: "[RBAC-01] Superadmin entra a /dashboard/users y ve CRUD completo de usuarios"
        - label: "[RBAC-02] Coordinador escribiendo /dashboard/users en la URL recibe 403/404 o redirige (no expone la lista)"
        - label: "[RBAC-03] Gerente en /dashboard/meetings ve SOLO reuniones de su departamento"
        - label: "[RBAC-04] Coordinador en /dashboard/commitments ve SOLO los compromisos asignados a él"
        - label: "[RBAC-05] Director creando usuario NO ve la opción 'superadmin' (o el backend rechaza con 403)"
        - label: "[RBAC-06] Desactivar a un usuario con sesión abierta hace que la siguiente acción reciba 401/403 y el frontend cierre sesión"

  - type: checkboxes
    id: ac-users
    attributes:
      label: 👥 Users CRUD
      options:
        - label: "[USERS-01] Crear usuario nuevo: aparece en la lista y se envía/muestra el password inicial"
        - label: "[USERS-02] Crear usuario con email duplicado devuelve 400 con 'Email ya registrado'"
        - label: "[USERS-03] Cambiar rol de coordinador a gerente actualiza permisos al re-loguear"
        - label: "[USERS-05] Búsqueda y paginación funcionan con >20 usuarios en BD (filtro + avance/retroceso de página)"
        - label: "[DEPT-01] Crear departamento desde /dashboard/departments lo agrega a la lista"

  - type: checkboxes
    id: ac-meetings
    attributes:
      label: 🎙️ Reuniones — Creación y validaciones
      options:
        - label: "[MEET-01] Crear reunión programada con título/fecha/tipo/participantes la deja en estado 'Programada'"
        - label: "[MEET-02] Crear reunión con título vacío dispara error de Zod y NO envía al backend"

  - type: checkboxes
    id: ac-recording
    attributes:
      label: 🔴 Grabación y transcripción
      options:
        - label: "[MEET-03] Iniciar grabación pide permiso de micrófono y arranca el contador con indicador rojo visible"
        - label: "[MEET-05] Hablando 10-15s al micrófono la transcripción aparece progresivamente en pantalla"
        - label: "[MEET-06] Con voces enroladas, el nombre del hablante aparece junto a cada turno y cambia al cambiar el speaker"
        - label: "[MEET-07] Detener y guardar sube el audio a R2, persiste la transcripción y pasa el estado a 'Finalizada'"
        - label: "[MEET-08] Cortar wifi 10s durante grabación: WebSocket reconecta solo y NO se pierde la transcripción acumulada"
        - label: "[MEET-09] 'Generar resumen' en reunión finalizada devuelve resumen con secciones (puntos clave/acuerdos/pendientes) en ~30s"

  - type: checkboxes
    id: ac-voice
    attributes:
      label: 🗣️ Voice profiles
      options:
        - label: "[VOICE-01] Enrolar voz por primera vez (~30s de muestra) crea el perfil y lo muestra en la lista"
        - label: "[VOICE-02] Re-enrolar voz sobrescribe embeddings anteriores y NO duplica el perfil"
        - label: "[VOICE-03] Hablante sin perfil enrolado se marca como 'Desconocido' o 'Speaker_X' (NUNCA se asigna a alguien por error)"
        - label: "[VOICE-04] Eliminar perfil borra los embeddings y la identificación deja de funcionar para ese usuario"

  - type: checkboxes
    id: ac-commitments
    attributes:
      label: ✅ Compromisos
      options:
        - label: "[COMM-01] Crear compromiso desde una reunión finalizada asignándolo a un coordinador dispara notificación a ese coordinador"
        - label: "[COMM-02] Crear compromiso manual desde /dashboard/commitments lo agrega a la lista"
        - label: "[COMM-03] Transición de estados (Pendiente → En progreso → Completado) persiste y se refleja en el listado"
        - label: "[COMM-04] Subtareas (marcar completada) y comentarios persisten con fecha y autor visibles"
        - label: "[COMM-05] Adjuntar PDF a un compromiso lo sube a R2 y permite descargarlo después"
        - label: "[COMM-06] Filtros por estado y por usuario asignado devuelven el listado correcto"

  - type: checkboxes
    id: ac-documents
    attributes:
      label: 📄 Documentos
      options:
        - label: "[DOC-01] Subir un .txt válido lo deja en estado 'Procesando' y luego 'Listo'"
        - label: "[DOC-02] Subir un .srt válido lo procesa y queda listo"
        - label: "[DOC-05] Subir archivo > límite configurado muestra error claro indicando el tamaño máximo"

  - type: checkboxes
    id: ac-chat-rag
    attributes:
      label: 💬 Chat IA (RAG)
      options:
        - label: "[CHAT-01] Pregunta sobre un documento procesado responde citando información que ESTÁ realmente en el documento"
        - label: "[CHAT-02] Pregunta sin contexto (sin documentos) responde 'no tengo contexto', NO inventa"
        - label: "[CHAT-03] Historial preserva contexto: 'y eso por qué?' entiende la referencia a la pregunta anterior"
        - label: "[CHAT-04] Con Gemini caído (API key inválida o cortado) el circuit breaker abre tras N fallos y el frontend muestra error amable sin colgarse"

  - type: checkboxes
    id: ac-reports
    attributes:
      label: 📑 Reportes
      options:
        - label: "[REPT-01] Generar reporte TXT desde una reunión con resumen descarga el .txt con las secciones correctas"
        - label: "[REPT-02] Generar Word con template custom reemplaza las variables correctamente en el .docx descargado"
        - label: "[REPT-03] Generar PDF desde una reunión con resumen descarga el PDF sin texto cortado ni caracteres raros"

  - type: checkboxes
    id: ac-notifications
    attributes:
      label: 🔔 Notificaciones
      options:
        - label: "[NOTIF-01] Asignar un compromiso a un coordinador con sesión abierta dispara notificación WebSocket en tiempo real (sin refrescar)"
        - label: "[NOTIF-02] 'Marcar todas como leídas' baja el contador a 0 y cambia el estilo de las notifs"
        - label: "[NOTIF-03] Compromiso con fecha cercana dispara notificación al coordinador asignado (job de vencimientos)"

  - type: checkboxes
    id: ac-dashboard
    attributes:
      label: 📊 Dashboard
      options:
        - label: "[DASH-01] Cada rol ve métricas acordes (coordinador NO ve totales globales; gerente ve los de su depto; etc.)"
        - label: "[DASH-02] Gráficas de Recharts cargan sin errores en consola, con datos coherentes y responsive en mobile"

  - type: checkboxes
    id: ac-security
    attributes:
      label: 🛡️ Seguridad
      options:
        - label: "[SEC-01] Response headers presentes: X-Content-Type-Options, X-Frame-Options, Strict-Transport-Security, Content-Security-Policy"
        - label: "[SEC-02] Título de reunión con <script>alert('xss')</script> se renderiza como texto plano en listado, detalle y reporte (NO ejecuta JS)"
        - label: "[SEC-03] Token JWT con un carácter del payload modificado es rechazado con 401"

  - type: checkboxes
    id: ac-ui
    attributes:
      label: 🎨 UI / UX
      options:
        - label: "[UI-03] Ruta inexistente (ej. /ruta-inexistente) muestra el 404 con fantasma 3D animado y botón de volver al dashboard"

  # ─── 3. Resultado global ────────────────────────────────────────────
  - type: dropdown
    id: result
    attributes:
      label: 🎯 Resultado global del QA
      options:
        - "✅ Aprobado para producción"
        - "⚠️ Aprobado con observaciones menores (anotar abajo)"
        - "❌ Rechazado — requiere correcciones (anotar abajo)"
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: 🔍 Hallazgos / observaciones
      description: |
        Para cada criterio que NO pasó, describe:
        - Qué probaste
        - Qué esperabas
        - Qué pasó realmente
        - Pasos para reproducir
        Si encuentras bugs grandes, abre issues SEPARADOS (uno por bug) y referencia desde acá.
      placeholder: |
        Ejemplo:
        - [MEET-08] Cortar wifi 12s: WebSocket reconecta pero se perdieron los últimos ~4s de transcripción. Issue separado: #57
        - [CHAT-02] Sin documentos, el modelo aún inventa un párrafo en vez de decir que no tiene contexto. Reproducible en Chrome 142.
      render: markdown
    validations:
      required: false

  - type: input
    id: time-spent
    attributes:
      label: ⏱️ Tiempo aproximado del QA
      placeholder: "1h 30min"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Tu rol queda registrado automáticamente — el sistema detecta al creador de este issue como QA reviewer del proyecto. No hace falta asignar a nadie.*
