name: 🧪 QA Review — Databack Endpoints & API Keys (solo aplica al repo databack)
description: "Checklist de QA del microservicio databack enfocado en endpoints autenticados (/auto/, /b2b/) y comportamiento del ApiKeyMiddleware. NO usar en otros repos de la org."
title: "[QA][databack] Release <vX.Y.Z>"
labels:
  - qa
body:
  # ─── 1. Contexto de la prueba ──────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 📋 Contexto de esta sesión de QA
        Llena estos campos antes de empezar. Si algo no aplica, escribe N/A.
        Convención: marcar cada item SOLO si la verificación fue ejecutada y aprobada. No marcar por inspección de código.

  - type: input
    id: tag-sha
    attributes:
      label: Tag / SHA del release
      description: Versión candidata + SHA corto para reproducir exactamente lo que probaste
      placeholder: "v1.4.2 / a1b2c3d"
    validations:
      required: true

  - type: input
    id: env-host
    attributes:
      label: Host QA
      description: "Ambiente probado (docker-compose.qa.yml). URL oficial de pruebas: https://testauto6.dnapp.com.mx/"
      value: "https://testauto6.dnapp.com.mx/"
    validations:
      required: true

  - type: input
    id: responsable
    attributes:
      label: Responsable QA
      placeholder: "@usuario-github"
    validations:
      required: true

  - type: input
    id: fecha
    attributes:
      label: Fecha de ejecución
      placeholder: "YYYY-MM-DD"
    validations:
      required: true

  - type: input
    id: pr-origen
    attributes:
      label: PR / Issue origen
      placeholder: "#123"
    validations:
      required: false

  # ─── 2. Placeholders de ApiKeys usadas ──────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 🔑 Placeholders de ApiKeys
        Los comandos `curl` de abajo referencian estos placeholders. Antes de ejecutar el QA, crea las keys necesarias desde `/panel-dna/api_keys/api keys/` y guarda los plaintext FUERA del repo.

        - Host QA: **`testauto6.dnapp.com.mx`** (URL completa: https://testauto6.dnapp.com.mx/)
        - `<DNA_PK_VALIDA>`: plaintext de una ApiKey activa
        - `<DNA_PK_NO_SYNC>`: ApiKey activa con `puede_sincronizar=False`
        - `<DNA_PK_SYNC_OK>`: ApiKey activa con `puede_sincronizar=True`
        - `<DNA_PK_SIN_PII>`: ApiKey con `nivel_pii='sin_pii'`
        - `<DNA_PK_COMPLETO>`: ApiKey con `nivel_pii='completo'`
        - `<DNA_PK_TABLAS_VACIAS>`: ApiKey con `tablas=[]`
        - `<DNA_PK_TABLAS_WILDCARD>`: ApiKey con `tablas=["*"]`
        - `<DNA_PK_TABLAS_APP>`: ApiKey con `tablas=["dna*"]`
        - `<DNA_PK_TABLA_EXACTA>`: ApiKey con `tablas=["dna.organizacion_empresa"]`
        - `<DNA_PK_INACTIVA>`: ApiKey con `activo=False`

  # ─── 3. Acceptance criteria críticos ────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance criteria — si rompe, NO se promueve a producción

  - type: checkboxes
    id: ac-prereqs
    attributes:
      label: 🧱 Pre-requisitos del ambiente
      options:
        - label: "`docker-compose -f docker-compose.qa.yml --env-file .env.qa ps` muestra `databack-qa-web` y `databack-qa-db` en estado `Up`"
        - label: "`init-users.sh` ya corrió en la BD QA (los 4 usuarios Postgres existen con sus privilegios)"
        - label: "Tabla `django_cache` existe (`createcachetable` ya se ejecutó)"
        - label: "Al menos una ApiKey activa creada desde `/panel-dna/api_keys/api keys/` (plaintext guardado fuera del repo)"
        - label: "Variables `TELEGRAM_BOT_TOKEN` / `TELEGRAM_CHAT_ID` cargadas (para verificar notificaciones)"

  - type: checkboxes
    id: ac-middleware
    attributes:
      label: 🔐 ApiKeyMiddleware — auth básica
      options:
        - label: "Sin header → 401 (curl -i https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/)"
        - label: "Key inexistente → 403 'API Key invalida' (curl -i -H 'X-API-Key: DNA_pk_no_existe_xxx' https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/)"
        - label: "Key con activo=False → 403 inmediato, el signal invalida cache (curl -i -H 'X-API-Key: <DNA_PK_INACTIVA>' https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/)"
        - label: "Header con espacios extra o case incorrecto → 403 (curl -i -H 'x-api-key:  <DNA_PK_VALIDA>' https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/)"
        - label: "Ruta /panel-dna/ NO exige X-API-Key, responde 200 o 302 (curl -i https://testauto6.dnapp.com.mx/panel-dna/login/)"

  - type: checkboxes
    id: ac-auto-gate
    attributes:
      label: 🤖 Gate /auto/dna/odoo/5min/
      options:
        - label: "Key con puede_sincronizar=False → 403 (curl -i -X POST -H 'X-API-Key: <DNA_PK_NO_SYNC>' https://testauto6.dnapp.com.mx/auto/dna/odoo/5min/)"
        - label: "Key con puede_sincronizar=True → 200 con conteos 'X de Y insertados/actualizados/eliminados' por entidad (curl -i -X POST -H 'X-API-Key: <DNA_PK_SYNC_OK>' https://testauto6.dnapp.com.mx/auto/dna/odoo/5min/)"
        - label: "Advisory lock — dos corridas concurrentes: una responde 200 con {data:{skipped:true}}, la otra ejecuta normal (curl -X POST -H 'X-API-Key: <DNA_PK_SYNC_OK>' .../auto/dna/odoo/5min/ & curl -X POST ... & wait)"
        - label: "Forzar error en sync (apagar Odoo o URL_ODOO inalcanzable) → notificación Telegram con stack truncado a ~3000 chars y prefijo 🔴"
        - label: "Sync con errores parciales → SyncLog.fecha NO avanza (FP-7 del CLAUDE.md). Verificar en /panel-dna/logs/sync logs/ antes y después"

  - type: checkboxes
    id: ac-b2b-gate
    attributes:
      label: 🛂 Gate /b2b/dna/... — patrones de `tablas`
      options:
        - label: "tablas=[] → 403 en todos los endpoints (curl -i -H 'X-API-Key: <DNA_PK_TABLAS_VACIAS>' https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/ y .../contabilidad/facturas/)"
        - label: "tablas=['*'] → 200 en todos (curl -i -H 'X-API-Key: <DNA_PK_TABLAS_WILDCARD>' https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/ y .../contabilidad/facturas/)"
        - label: "tablas=['dna*'] → 200 en endpoints dna (curl -i -H 'X-API-Key: <DNA_PK_TABLAS_APP>' https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/)"
        - label: "tablas=['dna.organizacion_empresa'] → 200 en empresas, 403 en facturas con mensaje 'API Key sin acceso a dna.contabilidad_factura' (curl -i -H 'X-API-Key: <DNA_PK_TABLA_EXACTA>' .../empresas/ y .../facturas/)"
        - label: "Vista nueva sin _b2b_match → 403 'Ruta B2B sin contrato de matching'. N/A si no se agregó vista que NO use _make_read_view en este release"

  - type: checkboxes
    id: ac-pii
    attributes:
      label: 🕵️ Filtrado PII por `nivel_pii`
      options:
        - label: "sin_pii GET facturas omite montos: no aparece monto_total, precio_unitario, precio_subtotal (cantidad SÍ está OK). curl -s -H 'X-API-Key: <DNA_PK_SIN_PII>' '.../facturas/?limit=1' | jq ."
        - label: "sin_pii + filtro sobre PII → 403 con mensaje de campo PII (curl -i -H 'X-API-Key: <DNA_PK_SIN_PII>' '.../facturas/?monto_total__gt=100')"
        - label: "sin_pii + ?fields= con PII → 403 (curl -i -H 'X-API-Key: <DNA_PK_SIN_PII>' '.../facturas/?fields=id,monto_total')"
        - label: "sin_pii + traversal FK con PII → 403 (curl -i -H 'X-API-Key: <DNA_PK_SIN_PII>' '.../lineas-factura/?fields=id,factura__monto_total')"
        - label: "completo: mismos 4 requests → 200 con todos los campos visibles"
        - label: "Modelo NO declarado en SAFE_FIELDS_BY_MODEL con sin_pii → {} por registro (fail-closed). N/A si no hay modelo nuevo sin agregar a permisos_pii.py"

  - type: checkboxes
    id: ac-generic-read
    attributes:
      label: 🔎 generic_read — filtros, fields, paginación
      options:
        - label: "Lookups soportados (icontains, gt, etc.) → 200 (curl -s -H 'X-API-Key: <DNA_PK_VALIDA>' '.../empresas/?nombre__icontains=evoluciona&limit=5')"
        - label: "Lookup no soportado → 400 (curl -i -H 'X-API-Key: <DNA_PK_VALIDA>' '.../empresas/?nombre__regex=^E')"
        - label: "or__ une con OR, devuelve hasta N registros (curl -s '.../empresas/?or__id=1|2|3&limit=10')"
        - label: "exclude__ excluye (curl -s '.../empresas/?exclude__id=1&limit=5')"
        - label: "Traversal FK 1 nivel funciona (curl -s '.../facturas/?fields=id,empresa__nombre&limit=3')"
        - label: "Traversal FK 2+ niveles → 400 (curl -i '.../facturas/?fields=id,empresa__pais__nombre')"
        - label: "?count=true incluye total (curl -s '.../empresas/?limit=1&count=true' | jq '.data.count')"
        - label: "offset>0 omite count por default (curl -s '.../empresas/?limit=5&offset=5' | jq 'has(\"count\")' → false)"
        - label: "limit=0 regresa todo; limit>10000 → 400 (curl -i '.../empresas/?limit=99999')"

  - type: checkboxes
    id: ac-cache
    attributes:
      label: ♻️ Cache de ApiKey (signals + admin action)
      options:
        - label: "Regenerar key → la vieja deja de aceptarse de inmediato (200 con vieja → admin acción regenerar_key → 403 con vieja SIN esperar 5 min → 200 con nueva)"
        - label: "Cambiar tablas en admin → siguiente request refleja el cambio (tablas=['dna*'] 200 → editar a [] → 403 inmediato)"
        - label: "Cambiar nivel_pii en admin → siguiente request refleja el cambio (completo: incluye monto_total → cambiar a sin_pii → ya no lo incluye)"
        - label: "Soft-disable → 403 inmediato sin esperar TTL (key activa 200 → marcar activo=False → mismo curl 403)"

  - type: checkboxes
    id: ac-logging
    attributes:
      label: 📜 Logging / auditoría
      options:
        - label: "api_keys.access_log registra 1 fila por request autenticado (disparar 3 requests y luego: docker exec databack-qa-db psql -U <USER_READONLY> -d <DB_NAME> -c \"SELECT count(*) FROM api_keys.access_log WHERE fecha > now() - interval '5 minutes';\" → >= 3)"
        - label: "purge_access_logs --dry-run --days 90 reporta candidatos SIN borrar (docker exec databack-qa-web python manage.py purge_access_logs --dry-run --days 90)"
        - label: "housekeeping --dry-run orquesta los 3 pasos: access_log + sessions + admin_log sin errores (docker exec databack-qa-web python manage.py housekeeping --dry-run)"

  - type: checkboxes
    id: ac-rate-limit
    attributes:
      label: 🚦 Rate limit (middleware de Traefik en QA)
      options:
        - label: "10 req/s sostenido → algunas requests responden 429 (for i in $(seq 1 50); do curl -s -o /dev/null -w '%{http_code}\\n' -H 'X-API-Key: <DNA_PK_VALIDA>' https://testauto6.dnapp.com.mx/b2b/dna/organizacion/empresas/?limit=1 & done; wait)"
        - label: "Rate limit aplica también a /auto/ (mismo middleware único)"

  - type: checkboxes
    id: ac-evidencia
    attributes:
      label: 📎 Evidencia a adjuntar al issue
      options:
        - label: "Screenshots o output de `curl -i` de cada bloque (resumido)"
        - label: "Captura del mensaje de Telegram cuando se forzó error de sync"
        - label: "Output completo de `housekeeping --dry-run`"
        - label: "Diff del SyncLog (antes / después de la corrida exitosa)"
        - label: "Lista de IDs de las ApiKeys QA usadas (NO plaintext, solo `id` + `nombre`)"

  # ─── 4. Criterios de rollback ───────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 🛑 Criterios de rollback / NO promover a producción
        Marca cada criterio que **NO se cumplió** (es decir, todo OK). Si CUALQUIERA queda sin marcar, **NO se promueve a `:latest`**: abre issue de bug bloqueante referenciando este checklist y revierte el deploy de QA al tag previo (`docker-compose -f docker-compose.qa.yml pull` con tag anterior + `up -d`).

  - type: checkboxes
    id: rollback
    attributes:
      label: ✅ Confirmación de NO-violación
      options:
        - label: "NO hay leak de PII: ninguna key `sin_pii` devuelve campos PII (monto, precio, costo, referencia ambigua) ni permite filtrar/proyectar sobre ellos"
        - label: "NO hay auth bypass: ninguna request sin X-API-Key o con key inválida obtuvo 200 fuera de /panel-dna/"
        - label: "Gate /auto/ íntegro: ninguna key con `puede_sincronizar=False` logró disparar un sync"
        - label: "Gate /b2b/ íntegro: ninguna key con `tablas=[]` o sin patrón que matchee obtuvo 200 en endpoint B2B"
        - label: "Advisory lock íntegro: dos corridas concurrentes del sync NO pegaron a Odoo en paralelo (no se ven dos pulls completos en logs)"
        - label: "Cache fresca: tras regenerar/desactivar una key, la versión vieja DEJÓ de responder 200 en ≤5 segundos"
        - label: "Sin 500 inesperados: ningún endpoint devolvió 500 por causa distinta a Odoo caído / BD caída"
        - label: "Notificaciones Telegram activas: todo sync con error 500 o `errores: [...]` no vacío generó mensaje en el chat configurado"
        - label: "SyncLog no avanza con errores: ninguna corrida con `errores: [...]` no vacío actualizó SyncLog.fecha"
        - label: "Migraciones consistentes: `python manage.py showmigrations` NO reporta migraciones sin aplicar en QA"

  # ─── 5. Resultado global ────────────────────────────────────────────
  - type: dropdown
    id: result
    attributes:
      label: 🎯 Resultado global del QA
      options:
        - "✅ Aprobado para promover a :latest"
        - "⚠️ Aprobado con observaciones menores (anotar abajo)"
        - "❌ Rechazado — requiere correcciones (anotar abajo)"
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: 🔍 Hallazgos / observaciones
      description: |
        Para cada criterio que NO pasó, describe:
        - Qué probaste
        - Qué esperabas
        - Qué pasó realmente
        - Pasos para reproducir
        Si encuentras bugs grandes, abre issues SEPARADOS (uno por bug) y referencia desde acá.
      placeholder: |
        Ejemplo:
        - [ac-pii] sin_pii devuelve monto_total en /facturas/?fields=id,monto_total — debería ser 403. Issue separado: #42
        - [ac-cache] tras regenerar_key, la vieja sigue respondiendo 200 por ~30s — sospecha de signal no conectado
      render: markdown
    validations:
      required: false

  # ─── 6. Aprobaciones ────────────────────────────────────────────────
  - type: input
    id: aprob-qa
    attributes:
      label: ✍️ Aprobación QA
      placeholder: "@usuario — YYYY-MM-DD"
    validations:
      required: true

  - type: input
    id: aprob-tl
    attributes:
      label: ✍️ Aprobación Tech Lead
      placeholder: "@usuario — YYYY-MM-DD"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Promover a `:latest` (build-main.yml) solo después de tener ambas aprobaciones y resultado ✅.*
