name: 🧪 QA Review — EuroLab (tienda en línea)
description: "Revisión de QA del e-commerce EuroLab (Next.js + FastAPI + Odoo + bot RAG). Criterios específicos de este proyecto — NO usar en otros repos."
title: "[QA][eurolab] <feature/sprint que estás probando>"
labels:
  - qa
body:
  # ─── 1. Contexto de la prueba ──────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## 📋 Contexto de esta sesión de QA
        Llena estos campos antes de empezar. Si algo no aplica, escribe N/A.
        Antes de marcar checks, **abre la web y reproduce cada flujo en orden** — no copies de un QA anterior.

  - type: input
    id: branch
    attributes:
      label: Rama probada
      description: ¿Sobre qué rama corres el QA?
      placeholder: "QA"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA (primeros 7 chars)
      description: Para reproducir exactamente lo que probaste
      placeholder: "a1b2c3d"
    validations:
      required: true

  - type: input
    id: env-url
    attributes:
      label: URL del entorno de pruebas
      placeholder: "https://eurolab.dnapp.com.mx"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser / dispositivo + versión
      placeholder: "Chrome 142 (desktop), Safari iOS 18 (móvil)"
    validations:
      required: false

  # ─── 2. Acceptance criteria ─────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance criteria — lo que si rompe, rompe el negocio

  - type: checkboxes
    id: ac-auth
    attributes:
      label: 🔐 Autenticación y cuenta
      options:
        - label: Login con credenciales válidas entra y redirige; con inválidas muestra error claro (sin filtrar si el correo existe)
        - label: Registro crea la cuenta y envía correo de verificación; recuperación de contraseña funciona (3 pasos)
        - label: Botón "Continuar con Google" aparece y completa el inicio de sesión
        - label: Logout cierra sesión y el token deja de ser válido (no se puede reusar pegándolo)

  - type: checkboxes
    id: ac-tienda
    attributes:
      label: 🛍️ Tienda y catálogo
      options:
        - label: El listado carga con precios e imágenes correctos y las cards quedan parejas (mismo alto, 3 por fila en desktop)
        - label: Filtros (categoría, En stock, En oferta, Precio) y orden funcionan y se reflejan en la URL
        - label: Buscador filtra productos (aparece UNA sola X) y "Cargar más" trae más sin recargar ni duplicar
        - label: 'La "Vista rápida" (hover en card) abre el modal con info real y permite agregar al carrito'

  - type: checkboxes
    id: ac-producto
    attributes:
      label: 📦 Detalle de producto y promociones
      options:
        - label: Detalle muestra imagen, precio, estado de stock ("Disponible"/"Solo X"/"Agotado") y descripción real de WordPress
        - label: 'Promo "arma tu paquete": cada activo se elige por su dropdown y NO deja agregar hasta completar todos los slots'
        - label: Activos agotados en Odoo aparecen deshabilitados "(Agotado)" en los selectores del paquete
        - label: La cantidad a comprar se limita al stock real (avisa si intentas pasarte)
        - label: Sección "También te puede interesar" muestra 3 productos de la misma categoría

  - type: checkboxes
    id: ac-carrito
    attributes:
      label: 🛒 Carrito
      options:
        - label: Agregar producto dispara la burbuja animada al ícono del carrito y el contador sube al llegar
        - label: El drawer del carrito permite cambiar cantidad / eliminar y recalcula el subtotal
        - label: Carrito anónimo (sin sesión) persiste al recargar; al iniciar sesión se fusiona con el del usuario sin perder ítems
        - label: El desglose de un bundle se ve completo en el carrito (Activo-1, Activo-2, …)

  - type: checkboxes
    id: ac-checkout
    attributes:
      label: 💳 Checkout y pago
      options:
        - label: Buscador de dirección (Google Places) autocompleta y rellena todos los campos; ciudad normalizada (León, no "León de los Aldama")
        - label: Envío es GRATIS cuando el carrito es de promoción y $236 en productos normales (coincide con el total del backend)
        - label: Pago con tarjeta de PRUEBA (4242 4242 4242 4242) se procesa y redirige a la pantalla de gracias
        - label: La pantalla "¡Gracias por tu compra!" muestra el número de pedido correcto
        - label: Llega el correo de confirmación de compra al cliente

  - type: checkboxes
    id: ac-odoo
    attributes:
      label: 🧾 Integración Odoo
      options:
        - label: Al confirmarse el pago se crea la cotización en Odoo (con el partner/cliente correcto)
        - label: Un bundle se EXPLOTA en sus activos reales (cada uno mapeado) + los H-DETOX incluidos como línea
        - label: El total de la cotización en Odoo cuadra EXACTO con el total del pedido (sin centavos de más/menos ni líneas perdidas)

  - type: checkboxes
    id: ac-bot
    attributes:
      label: 🤖 Asistente (EuroBot)
      options:
        - label: La burbuja del bot abre en cualquier página y responde en streaming
        - label: Recomienda productos con precios y enlaces REALES del catálogo (no inventa)
        - label: NO da dosis ni consejo médico — deriva a consultar un profesional
        - label: Agrega un producto al carrito desde el chat (se refleja en el contador) y consulta stock/precio en vivo
        - label: Ante info que no tiene (ej. devoluciones) NO inventa y deriva al formulario de contacto; rastrear pedido pide login

  - type: checkboxes
    id: ac-seguridad
    attributes:
      label: 🛡️ Seguridad y datos
      options:
        - label: Rutas privadas (perfil, mis pedidos) redirigen a /login sin sesión; un usuario no ve pedidos de otro
        - label: Las respuestas no exponen datos sensibles ni credenciales (tokens, API keys, datos de tarjeta)
        - label: Errores 500 no muestran stack traces ni rutas internas; el HTML proxied (WP) no rompe el sitio

  - type: checkboxes
    id: ac-ux
    attributes:
      label: ⚡ Experiencia y rendimiento
      options:
        - label: La web se ve y funciona bien en móvil (navbar, tienda, checkout, bot) sin overflow ni elementos rotos
        - label: Las páginas cargan en tiempo razonable y no hay errores en la consola del navegador (rojos)

  # ─── 3. Resultado global ────────────────────────────────────────────
  - type: dropdown
    id: result
    attributes:
      label: 🎯 Resultado global del QA
      options:
        - "✅ Aprobado para producción"
        - "⚠️ Aprobado con observaciones menores (anotar abajo)"
        - "❌ Rechazado — requiere correcciones (anotar abajo)"
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: 🔍 Hallazgos / observaciones
      description: |
        Para cada criterio que NO pasó, describe:
        - Qué probaste
        - Qué esperabas
        - Qué pasó realmente
        - Pasos para reproducir
        Si encuentras bugs grandes, abre issues SEPARADOS (uno por bug) y referencia desde acá.
      placeholder: |
        Ejemplo:
        - [checkout] El envío cobró $236 en un bundle promocional (debía ser gratis). Reproducible en Chrome. Issue: #42
        - [odoo] El total de la cotización quedó $0.01 abajo del pedido en el pack de 20.
      render: markdown
    validations:
      required: false

  - type: input
    id: time-spent
    attributes:
      label: ⏱️ Tiempo aproximado del QA
      placeholder: "1h 30min"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Recuerda probar con datos de PRUEBA (Stripe test, pedidos de prueba). No uses tarjetas reales ni datos personales reales en el ambiente de QA.*
